name: Deploy Python App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    - name: Add EC2 to known hosts
      run: |
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to EC2
      run: |
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} << 'EOF'

          echo "🚀 Connected to EC2"

          # 🔥 Update system
          sudo apt update -y

          # 🔥 Install Python, pip, git
          sudo apt install -y python3 python3-pip git

          # 🔥 Install Flask (system level - your working fix)
          pip3 install --break-system-packages flask

          # 🔥 Clone repo if not exists
          if [ ! -d "/home/ubuntu/app" ]; then
            git clone https://github.com/Quantamofsolace/app.git /home/ubuntu/app
          fi

          cd /home/ubuntu/app

          # 🔥 Pull latest code
          git pull origin main

          # 🔥 Install dependencies (requirements.txt)
          pip3 install --break-system-packages -r requirements.txt

          # 🔥 Stop old app
          pkill -f app.py || true

          # 🔥 Start app
          nohup python3 app.py > output.log 2>&1 &

          echo "✅ Deployment Completed Successfully"

        EOF
