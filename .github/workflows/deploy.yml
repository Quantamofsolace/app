name: Deploy to EC2
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            set -e   # 🔥 FAIL FAST (important for debugging)

            echo "===== CONNECTED TO EC2 ====="
            whoami
            pwd

            echo "===== INSTALLING DEPENDENCIES ====="
            sudo apt update -y
            sudo apt install -y python3 python3-pip git

            echo "===== CLEANING OLD APP ====="
            rm -rf /home/ubuntu/app

            echo "===== CLONING REPO ====="
            git clone https://github.com/Quantamofsolace/app.git /home/ubuntu/app

            echo "===== MOVING INTO DIRECTORY ====="
            cd /home/ubuntu/app
            ls -l   # 🔥 DEBUG

            echo "===== INSTALLING PYTHON DEPENDENCIES ====="
            pip3 install --user -r requirements.txt

            echo "===== STOPPING OLD APP ====="
            pkill -f app.py || true

            echo "===== STARTING APP ====="
            nohup python3 app.py > output.log 2>&1 &

            echo "===== DONE ====="
          EOF
