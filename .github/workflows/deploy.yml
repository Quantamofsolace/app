name: Deploy Python App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_DEFAULT_REGION: ap-south-1

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to EC2
      run: |
        ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} << 'EOF'

          echo "🚀 Starting Deployment..."

          # Install dependencies (safe even if already installed)
          sudo apt update -y
          sudo apt install -y python3 python3-pip git

          # Remove old repo (to avoid conflicts)
          rm -rf /home/ubuntu/app

          # Clone using HTTPS (NO SSH REQUIRED)
          git clone https://github.com/Quantamofsolace/app.git /home/ubuntu/app

          cd /home/ubuntu/app

          # Install Python dependencies
          pip3 install --user -r requirements.txt

          # Kill existing app if running
          pkill -f app.py || true

          # Run app in background
          nohup python3 app.py > output.log 2>&1 &

          echo "✅ Deployment Successful!"

        EOF
